# E2E-Smoke (Playwright) — eigener Workflow, UNABHÄNGIG vom Deploy.
# Läuft bei Push auf main + Pull Requests; ein Fehler hier blockiert das Deployen
# nicht, ist aber sofort sichtbar (Regressionsschutz für die Kernflüsse).
name: E2E Smoke

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Playwright-Browser installieren (Chromium + System-Deps)
        run: npx playwright install --with-deps chromium
      - name: Smoke-Tests
        run: npm run test:e2e
      - name: Report bei Fehler hochladen
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
